databases:
  - name: grid-interconnection-copilot-db
    plan: basic_256mb
    databaseName: gridcopilot
    user: gridcopilot

services:
  - type: web
    name: grid-interconnection-copilot
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: grid-interconnection-copilot-db
          property: connectionString
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: admin
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: TRUSTED_HOSTS
        value: "*.onrender.com,localhost,127.0.0.1"
      - key: ENFORCE_HTTPS
        value: "true"
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: RUN_DB_MIGRATIONS
        value: "true"
